name: Daily Kotak Login at 9 AM IST

# Runs Mon-Fri at 9:00 AM IST (3:30 AM UTC)
# Skips weekends (Indian stock market closed)
# TEST: also runs at 23:40 IST = 18:10 UTC today for verification

on:
  schedule:
    - cron: '30 3 * * 1-5'
    - cron: '10 18 * * *'   # TEMP TEST: 23:40 IST daily — remove after verification
  workflow_dispatch:  # allows manual trigger from GitHub UI for testing

jobs:
  trigger-login:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render dashboard to trigger login
        run: |
          echo "Waking Render app..."
          curl -s -o /dev/null -w "Wake ping: HTTP %{http_code}\n" \
            --max-time 60 \
            "${{ secrets.RENDER_APP_URL }}/" || true

          sleep 10

          echo "Clearing session..."
          # POST /refresh clears session (returns 302 redirect — don't follow)
          curl -s -o /dev/null -w "Refresh: HTTP %{http_code}\n" \
            -X POST \
            --max-time 30 \
            "${{ secrets.RENDER_APP_URL }}/refresh"

          sleep 3

          echo "Triggering fresh login via GET /..."
          # GET / calls ensure_client() which does a fresh TOTP login
          curl -s -o /dev/null -w "Login trigger: HTTP %{http_code}\n" \
            --max-time 120 \
            "${{ secrets.RENDER_APP_URL }}/"

          echo "Verifying login succeeded via /history..."
          curl -s --max-time 30 "${{ secrets.RENDER_APP_URL }}/history" | grep -oE "(SUCCESS|FAILED)" | head -1 || echo "Could not verify"

          echo "Done."
