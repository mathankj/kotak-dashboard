<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Change Password — Kotak Dashboard</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #1a1a1a; color: #eee;
           display: flex; justify-content: center; align-items: center; height: 100vh;
           margin: 0; }
    .card { background: #2a2a2a; padding: 2rem 2.5rem; border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5); width: 320px; }
    h1 { margin: 0 0 1rem; font-size: 1.1rem; font-weight: normal; opacity: 0.8; }
    label { display: block; margin: 0.7rem 0 0.2rem; font-size: 0.9rem; }
    input[type=password] { width: 100%; padding: 0.5rem; box-sizing: border-box;
                           background: #1a1a1a; color: #eee; border: 1px solid #444;
                           border-radius: 4px; }
    button { width: 100%; padding: 0.6rem; margin-top: 1rem; background: #4a8;
             color: #000; border: 0; border-radius: 4px; cursor: pointer;
             font-weight: bold; }
    .err { color: #f66; margin-top: 0.7rem; font-size: 0.9rem; }
    a { color: #6cf; }
  </style>
</head>
<body>
  <form class="card" method="POST" action="{{ url_for('auth.change_password_view') }}">
    <h1>Change Password</h1>
    <label for="cur">Current password</label>
    <input id="cur" type="password" name="current" autofocus required>
    <label for="new">New password</label>
    <input id="new" type="password" name="new" required minlength="8">
    <label for="conf">Confirm new password</label>
    <input id="conf" type="password" name="confirm" required minlength="8">
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
    <button type="submit">Change Password</button>
    <p style="margin-top: 1rem; font-size: 0.85rem; opacity: 0.7;">
      Note: changing the password will log out all other browsers.
      <a href="/">Cancel</a>
    </p>
  </form>
</body>
</html>
