services:
  - type: web
    name: kotak-dashboard
    runtime: python
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: KOTAK_CONSUMER_KEY
        sync: false
      - key: KOTAK_CONSUMER_SECRET
        sync: false
      - key: KOTAK_ACCESS_TOKEN
        sync: false
      - key: KOTAK_UCC
        sync: false
      - key: KOTAK_MOBILE
        sync: false
      - key: KOTAK_MPIN
        sync: false
      - key: KOTAK_TOTP_SECRET
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.9
